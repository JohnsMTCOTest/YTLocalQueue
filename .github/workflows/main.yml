name: Build YTLocalQueue

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Fetch YouTube Headers
        run: |
          git clone --depth=1 https://github.com/PoomSmart/YouTubeHeader.git Headers/YouTubeHeader
          git clone --depth=1 https://github.com/PoomSmart/PSHeader.git Headers/PSHeader

      - name: Build Tweak
        run: |
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

      - name: Collect dylib
        run: |
          mkdir -p out
          find .theos -name 'YTLocalQueue.dylib' -exec cp {} out/ \; || true
          echo "---- Contents of out/ ----"
          ls -la out/

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: YTLocalQueue-dylib
          path: out/YTLocalQueue.dylib

      - name: Upload Deb (backup)
        uses: actions/upload-artifact@v4
        with:
          name: YTLocalQueue-deb
          path: packages/*.deb
