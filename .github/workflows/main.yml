name: Build YTLocalQueue

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos-action@v1
        with:
          arch: arm64 arm64e

      - name: Fetch YouTube Headers
        run: |
          mkdir -p Headers
          git clone https://github.com Headers/YouTubeHeader

      - name: Build Tweak
        run: |
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1

      - name: Upload Compiled Package
        uses: actions/artifacts@v4
        with:
          name: YTLocalQueue-Build
          path: packages/*.deb
